<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenAgentSkill trust score and coverage chart</title>
  <desc id="desc">A visual chart showing trust score inputs, domain coverage, and agent outcome feedback.</desc>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ded8ca"/>
    </pattern>
    <linearGradient id="greenBar" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#006b4f"/>
      <stop offset="100%" stop-color="#3aa676"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#151412" flood-opacity="0.09"/>
    </filter>
  </defs>
  <rect width="1200" height="560" fill="#faf8f1"/>
  <rect width="1200" height="560" fill="url(#grid)" opacity="0.9"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="72" y="62" fill="#151412" font-size="13" font-weight="800" letter-spacing="3.2">TRUST SCORE · COVERAGE · OUTCOMES</text>
    <text x="72" y="102" fill="#151412" font-size="34" font-weight="800">What agents inspect before installing a skill.</text>
    <text x="72" y="132" fill="#5f5a51" font-size="16">OpenAgentSkill turns repo metadata, audit signals, install readiness, and real outcomes into a decision layer.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="170" width="484" height="306" rx="22" fill="#fffdf7" stroke="#d9d0bf"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="104" y="212" fill="#151412" font-size="20" font-weight="800">Trust Score Inputs</text>
    <text x="104" y="236" fill="#746f66" font-size="13">Weighted signals for agent adoption readiness</text>

    <text x="104" y="280" fill="#151412" font-size="12" font-weight="700">Maintenance freshness</text>
    <rect x="278" y="266" width="220" height="18" rx="9" fill="#ebe5d8"/>
    <rect x="278" y="266" width="198" height="18" rx="9" fill="url(#greenBar)"/>
    <text x="510" y="280" fill="#006b4f" font-size="12" font-weight="800">90</text>

    <text x="104" y="322" fill="#151412" font-size="12" font-weight="700">README / SKILL.md</text>
    <rect x="278" y="308" width="220" height="18" rx="9" fill="#ebe5d8"/>
    <rect x="278" y="308" width="180" height="18" rx="9" fill="url(#greenBar)"/>
    <text x="510" y="322" fill="#006b4f" font-size="12" font-weight="800">82</text>

    <text x="104" y="364" fill="#151412" font-size="12" font-weight="700">License clarity</text>
    <rect x="278" y="350" width="220" height="18" rx="9" fill="#ebe5d8"/>
    <rect x="278" y="350" width="164" height="18" rx="9" fill="url(#greenBar)"/>
    <text x="510" y="364" fill="#006b4f" font-size="12" font-weight="800">75</text>

    <text x="104" y="406" fill="#151412" font-size="12" font-weight="700">Install safety</text>
    <rect x="278" y="392" width="220" height="18" rx="9" fill="#ebe5d8"/>
    <rect x="278" y="392" width="188" height="18" rx="9" fill="url(#greenBar)"/>
    <text x="510" y="406" fill="#006b4f" font-size="12" font-weight="800">86</text>

    <text x="104" y="448" fill="#151412" font-size="12" font-weight="700">Outcome evidence</text>
    <rect x="278" y="434" width="220" height="18" rx="9" fill="#ebe5d8"/>
    <rect x="278" y="434" width="132" height="18" rx="9" fill="url(#greenBar)"/>
    <text x="510" y="448" fill="#006b4f" font-size="12" font-weight="800">60</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="604" y="170" width="524" height="306" rx="22" fill="#11100e"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="640" y="212" fill="#fffdf7" font-size="20" font-weight="800">Coverage Map</text>
    <text x="640" y="236" fill="#b7b0a5" font-size="13">Domain and scenario pages that make the registry easier to discover</text>

    <rect x="640" y="272" width="124" height="58" rx="14" fill="#1b1a17" stroke="#34302a"/>
    <text x="660" y="296" fill="#fffdf7" font-size="13" font-weight="800">Coding</text>
    <text x="660" y="315" fill="#b7b0a5" font-size="11">PR · CI · repo</text>
    <circle cx="742" cy="294" r="4" fill="#006b4f"/>

    <rect x="784" y="272" width="124" height="58" rx="14" fill="#1b1a17" stroke="#34302a"/>
    <text x="804" y="296" fill="#fffdf7" font-size="13" font-weight="800">Finance</text>
    <text x="804" y="315" fill="#b7b0a5" font-size="11">stocks · quant</text>
    <circle cx="886" cy="294" r="4" fill="#c58b25"/>

    <rect x="928" y="272" width="124" height="58" rx="14" fill="#1b1a17" stroke="#34302a"/>
    <text x="948" y="296" fill="#fffdf7" font-size="13" font-weight="800">RAG</text>
    <text x="948" y="315" fill="#b7b0a5" font-size="11">docs · graph</text>
    <circle cx="1030" cy="294" r="4" fill="#006b4f"/>

    <rect x="640" y="350" width="124" height="58" rx="14" fill="#1b1a17" stroke="#34302a"/>
    <text x="660" y="374" fill="#fffdf7" font-size="13" font-weight="800">PDF</text>
    <text x="660" y="393" fill="#b7b0a5" font-size="11">OCR · parse</text>
    <circle cx="742" cy="372" r="4" fill="#c58b25"/>

    <rect x="784" y="350" width="124" height="58" rx="14" fill="#1b1a17" stroke="#34302a"/>
    <text x="804" y="374" fill="#fffdf7" font-size="13" font-weight="800">Browser</text>
    <text x="804" y="393" fill="#b7b0a5" font-size="11">click · forms</text>
    <circle cx="886" cy="372" r="4" fill="#006b4f"/>

    <rect x="928" y="350" width="124" height="58" rx="14" fill="#1b1a17" stroke="#34302a"/>
    <text x="948" y="374" fill="#fffdf7" font-size="13" font-weight="800">Growth</text>
    <text x="948" y="393" fill="#b7b0a5" font-size="11">SEO · X · CRM</text>
    <circle cx="1030" cy="372" r="4" fill="#c58b25"/>

    <rect x="640" y="430" width="412" height="28" rx="14" fill="#006b4f"/>
    <text x="846" y="449" text-anchor="middle" fill="#fffdf7" font-size="11" font-weight="800" letter-spacing="1.6">SCENARIOS: SCRAPE · ANALYZE · PARSE · INSTALL · REPORT</text>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="72" y="506" width="250" height="32" rx="16" fill="#eaf3ed" stroke="#c7ddce"/>
    <text x="92" y="527" fill="#006b4f" font-size="12" font-weight="800">10,000+ indexed skills</text>
    <rect x="342" y="506" width="250" height="32" rx="16" fill="#fff7e6" stroke="#ead4ab"/>
    <text x="362" y="527" fill="#8a5c0d" font-size="12" font-weight="800">20+ GitHub skill maps</text>
    <rect x="612" y="506" width="250" height="32" rx="16" fill="#eaf3ed" stroke="#c7ddce"/>
    <text x="632" y="527" fill="#006b4f" font-size="12" font-weight="800">Agent-readable APIs</text>
    <rect x="882" y="506" width="246" height="32" rx="16" fill="#fff7e6" stroke="#ead4ab"/>
    <text x="902" y="527" fill="#8a5c0d" font-size="12" font-weight="800">Outcome-ranked registry</text>
  </g>
</svg>
