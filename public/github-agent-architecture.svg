<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenAgentSkill agent architecture</title>
  <desc id="desc">A diagram showing agents, skill domains, OpenAgentSkill resolve engine, trust layer, install plan, and outcome feedback.</desc>
  <defs>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
